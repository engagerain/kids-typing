<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎓 Kids Learning Fun!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #d4fc79 100%);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .bg-deco {
    position: fixed;
    font-size: 2.5rem;
    opacity: 0.2;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(360deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 1.5rem;
    width: min(95vw, 600px);
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: #ff6b9d;
    text-shadow: 2px 2px 0 #fff;
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: #7c5cbf;
    font-weight: 600;
    margin-bottom: 2rem;
  }

  .game-grid {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    width: 100%;
  }

  .game-card {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding: 1.3rem 1.5rem;
    border-radius: 24px;
    border: 4px solid transparent;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .game-card:hover {
    transform: scale(1.03);
    border-color: rgba(255,255,255,0.8);
  }
  .game-card:active { transform: scale(0.97); }

  .game-card .card-icon {
    font-size: 3.5rem;
    flex-shrink: 0;
  }

  .game-card .card-text {
    text-align: left;
  }

  .game-card .card-title {
    font-size: clamp(1.3rem, 4vw, 1.7rem);
    font-weight: 800;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.15);
  }

  .game-card .card-desc {
    font-size: clamp(0.8rem, 2.5vw, 0.95rem);
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    margin-top: 0.2rem;
  }

  .card-typing {
    background: linear-gradient(135deg, #ff6b9d, #ffb347);
    box-shadow: 0 6px 24px rgba(255, 107, 157, 0.35);
  }

  .card-spelling {
    background: linear-gradient(135deg, #e17055, #fdcb6e);
    box-shadow: 0 6px 24px rgba(225, 112, 85, 0.35);
  }

  .footer {
    margin-top: 2rem;
    font-size: 0.85rem;
    color: rgba(124, 92, 191, 0.6);
    font-weight: 600;
  }

  @media (max-width: 480px) {
    .container { padding: 1rem; }
    .game-card { padding: 1rem 1.2rem; gap: 1rem; }
    .game-card .card-icon { font-size: 2.8rem; }
  }
</style>
</head>
<body>

<script>
  const decoEmojis = ['⭐','🌈','🎈','🦋','🌸','🎵','💫','🌻','🍀','🎀','📚','✏️'];
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'bg-deco';
    el.textContent = decoEmojis[i % decoEmojis.length];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (8 + Math.random() * 10) + 's';
    el.style.animationDelay = (-Math.random() * 15) + 's';
    el.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
    document.body.appendChild(el);
  }
</script>

<div class="container">
  <h1>🎓 Kids Learning Fun!</h1>
  <p class="subtitle">Pick a game to play!</p>

  <div class="game-grid">
    <a href="typing.html" class="game-card card-typing">
      <div class="card-icon">⌨️🎈</div>
      <div class="card-text">
        <div class="card-title">Typing Practice</div>
        <div class="card-desc">Type words letter by letter with fun themes — Frozen, Zootopia, Princess & more!</div>
      </div>
    </a>

    <a href="spell.html" class="game-card card-spelling">
      <div class="card-icon">🔤✏️</div>
      <div class="card-text">
        <div class="card-title">Spelling Practice</div>
        <div class="card-desc">Listen to the word and fill in the missing letters!</div>
      </div>
    </a>
  </div>

  <p class="footer">Made with ❤️ for little learners</p>
</div>

</body>
</html>
