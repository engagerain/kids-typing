<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔤 Spelling Fun for Kids!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .bg-deco {
    position: fixed;
    font-size: 2.5rem;
    opacity: 0.2;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(360deg); }
  }

  .game-container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 1.2rem;
    width: min(98vw, 700px);
  }

  h1 {
    font-size: clamp(1.6rem, 5.5vw, 2.8rem);
    color: #e17055;
    text-shadow: 2px 2px 0 #fff;
    margin-bottom: 0.3rem;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .screen.active { display: flex; }

  /* Word display */
  .word-display {
    display: flex;
    justify-content: center;
    gap: clamp(5px, 1.5vw, 12px);
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }

  .letter-box {
    width: clamp(44px, 13vw, 80px);
    height: clamp(52px, 15vw, 90px);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.6rem, 6vw, 3rem);
    font-weight: 800;
    text-transform: uppercase;
    background: #fff;
    border: 3px solid #e0e0e0;
    color: #636e72;
    transition: all 0.3s ease;
  }

  .letter-box.blank {
    border-color: #fdcb6e;
    background: #fef9e7;
    color: #fdcb6e;
    border-style: dashed;
  }

  .letter-box.blank.active {
    border-color: #e17055;
    background: #fff5f2;
    color: #e17055;
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(225, 112, 85, 0.4);
    animation: pulse 1.2s ease-in-out infinite;
    border-style: solid;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(225, 112, 85, 0.3); }
    50%      { box-shadow: 0 0 35px rgba(225, 112, 85, 0.6); }
  }

  .letter-box.filled {
    border-color: #00b894;
    background: #e8faf5;
    color: #00b894;
    border-style: solid;
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .letter-box.wrong {
    animation: shake 0.4s ease;
    border-color: #ff6b6b;
    background: #fff0f0;
    border-style: solid;
  }

  .letter-box.given {
    color: #b2bec3;
    border-color: #dfe6e9;
    background: #f8f9fa;
  }

  @keyframes popIn {
    0%   { transform: scale(0.7); }
    60%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-6px); }
    80%      { transform: translateX(6px); }
  }

  .message {
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    min-height: 2rem;
    color: #6c5ce7;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .hint {
    font-size: 0.9rem;
    color: #999;
    margin-top: 0.2rem;
  }

  /* Buttons */
  .btn {
    font-size: 1.3rem;
    padding: 0.7rem 2rem;
    border: none;
    border-radius: 50px;
    color: #fff;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:hover { transform: scale(1.04); }
  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: linear-gradient(135deg, #e17055, #fdcb6e);
    box-shadow: 0 5px 18px rgba(225, 112, 85, 0.4);
  }

  .btn-sound {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    box-shadow: 0 5px 18px rgba(108, 92, 231, 0.3);
    font-size: 1.5rem;
    padding: 0.8rem 2rem;
    margin-bottom: 0.5rem;
  }

  .btn-home {
    background: linear-gradient(135deg, #a29bfe, #6c5ce7);
    box-shadow: 0 5px 18px rgba(108, 92, 231, 0.3);
    font-size: 1rem;
    padding: 0.5rem 1.5rem;
  }

  .score-bar {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 0.8rem;
  }
  .score-item {
    background: rgba(255,255,255,0.7);
    padding: 0.3rem 1rem;
    border-radius: 30px;
    font-size: 0.95rem;
    font-weight: 700;
    color: #6c5ce7;
  }

  /* Celebration */
  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }
  .celebration.active { display: block; }

  .confetti-piece {
    position: fixed;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 10;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .star-burst {
    position: fixed;
    font-size: 3rem;
    animation: starPop 1s ease forwards;
    z-index: 11;
    pointer-events: none;
  }

  @keyframes starPop {
    0%   { transform: scale(0) rotate(0deg); opacity: 1; }
    50%  { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(0.5) rotate(360deg); opacity: 0; }
  }

  .back-btn {
    position: absolute;
    top: 0.3rem;
    left: 0.3rem;
    font-size: 1.1rem;
    padding: 0.35rem 0.9rem;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.6);
    color: #6c5ce7;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    z-index: 2;
    touch-action: manipulation;
  }
  .back-btn:hover { background: rgba(255,255,255,0.9); }

  /* Nav link */
  .nav-link {
    display: inline-block;
    margin-top: 0.8rem;
    font-size: 0.95rem;
    color: #6c5ce7;
    text-decoration: none;
    font-weight: 700;
    padding: 0.4rem 1.2rem;
    border-radius: 30px;
    background: rgba(255,255,255,0.5);
    transition: background 0.2s;
  }
  .nav-link:hover { background: rgba(255,255,255,0.8); }

  /* Mobile input */
  .mobile-input {
    position: fixed;
    top: -100px;
    left: 0;
    opacity: 0;
    width: 1px;
    height: 1px;
    border: none;
    font-size: 16px;
  }

  @media (max-width: 480px) {
    .game-container { padding: 0.8rem; }
    h1 { margin-bottom: 0.2rem; }
    .letter-box {
      width: clamp(38px, 14vw, 60px);
      height: clamp(46px, 16vw, 68px);
      border-radius: 12px;
      font-size: clamp(1.4rem, 7vw, 2.4rem);
    }
    .score-bar { gap: 0.5rem; }
    .score-item { font-size: 0.85rem; padding: 0.25rem 0.7rem; }
    .btn { font-size: 1.1rem; padding: 0.6rem 1.6rem; }
    .btn-sound { font-size: 1.3rem; padding: 0.7rem 1.6rem; }
  }
</style>
</head>
<body>

<input type="text" class="mobile-input" id="mobileInput" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">

<script>
  const decoEmojis = ['🔤','✏️','📖','🌟','💡','🎯','📝','🧩','🎓','✨'];
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'bg-deco';
    el.textContent = decoEmojis[i % decoEmojis.length];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (8 + Math.random() * 10) + 's';
    el.style.animationDelay = (-Math.random() * 15) + 's';
    el.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
    document.body.appendChild(el);
  }
</script>

<div class="game-container">
  <!-- Start Screen -->
  <div id="startScreen" class="screen active">
    <h1>🔤 Spelling Fun!</h1>
    <p style="font-size:1.1rem; color:#6c5ce7; font-weight:600;">Listen, then type every letter!</p>
    <div style="font-size:4rem; margin:0.5rem 0;">✏️📖</div>
    <button class="btn btn-primary" id="startBtn">▶ Start!</button>
    <p class="hint">Press Space or tap 🔊 to hear the word again</p>
    <a href="index.html" class="nav-link">🏠 Back to Home</a>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="screen">
    <button class="back-btn" id="backBtn">← Back</button>
    <h1>🔤 Spelling Fun!</h1>
    <div class="score-bar">
      <div class="score-item">⭐ <span id="score">0</span></div>
      <div class="score-item">📝 <span id="wordNum">1</span> / <span id="totalWords">10</span></div>
    </div>
    <button class="btn btn-sound" id="soundBtn">🔊 Listen Again</button>
    <div class="word-display" id="wordDisplay"></div>
    <div class="message" id="message">Fill in the missing letters! ✏️</div>
    <p class="hint">Press Space or tap 🔊 to hear again</p>
  </div>

  <!-- End Screen -->
  <div id="endScreen" class="screen">
    <h1>🎉 Great Spelling!</h1>
    <p style="font-size:1.4rem; color:#6c5ce7; font-weight:700;">
      You spelled <span id="finalScore">0</span> words!
    </p>
    <div style="font-size:3.5rem; margin:0.5rem 0;">🏆</div>
    <button class="btn btn-primary" id="playAgainBtn">🔄 Play Again!</button>
    <a href="index.html" class="nav-link">🏠 Back to Home</a>
  </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
(function() {
  const WORDS = [
    'look','with','her','what','was','can','his','him',
    'on','did','girl','but','for','up','all'
  ];

  const ROUND_SIZE = 10;
  const CELEBRATE_MESSAGES = [
    "Great job! 🎉", "Awesome! 🌟", "You did it! 🏆",
    "Super! 💪", "Amazing! ✨", "Fantastic! 🎈",
    "Wonderful! 🌈", "Perfect! ⭐", "Brilliant! 🎊", "Wow! 🦋"
  ];

  // ── State ──
  let words = [];
  let wordIndex = 0;
  let score = 0;
  let isPlaying = false;
  let isCelebrating = false;

  // Current word state
  let currentWord = '';
  let currentIndex = 0;  // which letter we're on
  let blanks = [];       // indices of hidden letters
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  // ── DOM ──
  const startScreen   = document.getElementById('startScreen');
  const gameScreen     = document.getElementById('gameScreen');
  const endScreen      = document.getElementById('endScreen');
  const wordDisplay    = document.getElementById('wordDisplay');
  const messageEl      = document.getElementById('message');
  const scoreEl        = document.getElementById('score');
  const wordNumEl      = document.getElementById('wordNum');
  const totalEl        = document.getElementById('totalWords');
  const finalScoreEl   = document.getElementById('finalScore');
  const celebrationEl  = document.getElementById('celebration');
  const soundBtn       = document.getElementById('soundBtn');
  const mobileInput    = document.getElementById('mobileInput');

  // ── Mobile ──
  function focusMobileInput() {
    if (isMobile && isPlaying) {
      mobileInput.value = '';
      mobileInput.focus();
    }
  }

  if (isMobile) {
    gameScreen.addEventListener('click', (e) => {
      if (e.target !== soundBtn) focusMobileInput();
    });

    mobileInput.addEventListener('input', () => {
      const val = mobileInput.value;
      if (val.length > 0) {
        const ch = val[val.length - 1].toLowerCase();
        if (ch >= 'a' && ch <= 'z') {
          processKey(ch);
        }
        mobileInput.value = '';
      }
    });
  }

  // ── Speech (auto-select best voice) ──
  let bestVoice = null;

  function findBestVoice() {
    const voices = window.speechSynthesis.getVoices();
    const preferred = [
      'Samantha', 'Karen', 'Daniel', 'Moira',
      'Google US English', 'Google UK English Female',
      'Microsoft Zira', 'Microsoft David'
    ];
    for (const name of preferred) {
      const v = voices.find(v => v.name.includes(name));
      if (v) return v;
    }
    // fallback: any en-US voice
    return voices.find(v => v.lang.startsWith('en')) || null;
  }

  if ('speechSynthesis' in window) {
    bestVoice = findBestVoice();
    window.speechSynthesis.onvoiceschanged = () => {
      bestVoice = findBestVoice();
    };
  }

  function speak(text, rate = 1, pitch = 1.1) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = rate;
    u.pitch = pitch;
    u.lang = 'en-US';
    if (bestVoice) u.voice = bestVoice;
    window.speechSynthesis.speak(u);
  }

  function speakWord() {
    speak(currentWord, 0.8, 1.0);
  }

  function speakLetter(ch) {
    speak(ch.toLowerCase(), 0.9, 1.1);
  }

  // ── Celebration ──
  function showCelebration() {
    isCelebrating = true;
    celebrationEl.innerHTML = '';
    celebrationEl.classList.add('active');

    const colors = ['#e17055','#fdcb6e','#00b894','#6c5ce7','#ff6b6b','#74b9ff','#55efc4','#fd79a8'];
    for (let i = 0; i < 35; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      c.style.width = (8 + Math.random() * 10) + 'px';
      c.style.height = (8 + Math.random() * 10) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      celebrationEl.appendChild(c);
    }

    const starEmojis = ['⭐','🌟','✨','💫','🎉','🎊'];
    for (let i = 0; i < 6; i++) {
      const s = document.createElement('div');
      s.className = 'star-burst';
      s.textContent = starEmojis[i];
      s.style.left = (15 + Math.random() * 70) + 'vw';
      s.style.top = (20 + Math.random() * 40) + 'vh';
      s.style.animationDelay = (Math.random() * 0.4) + 's';
      celebrationEl.appendChild(s);
    }

    setTimeout(() => {
      celebrationEl.classList.remove('active');
      celebrationEl.innerHTML = '';
      isCelebrating = false;
    }, 2500);
  }

  // ── Game Logic ──
  function pickWords() {
    const shuffled = [...WORDS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, ROUND_SIZE);
  }

  // ── Blanks logic ──
  function chooseBlanks(word) {
    const len = word.length;
    let numBlanks;
    if (len <= 2) {
      numBlanks = 1;
    } else if (len <= 4) {
      numBlanks = Math.random() < 0.5 ? 1 : 2;
    } else {
      numBlanks = Math.floor(Math.random() * 2) + 2; // 2-3
    }
    numBlanks = Math.min(numBlanks, len - 1);

    const indices = [];
    for (let i = 0; i < len; i++) indices.push(i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    return indices.slice(0, numBlanks).sort((a, b) => a - b);
  }

  function renderWord() {
    currentWord = words[wordIndex];
    blanks = chooseBlanks(currentWord);
    currentIndex = 0;

    wordDisplay.innerHTML = '';
    for (let i = 0; i < currentWord.length; i++) {
      const box = document.createElement('div');
      box.className = 'letter-box';
      box.id = 'lb-' + i;

      if (blanks.includes(i)) {
        // Hidden letter — show ?
        box.classList.add('blank');
        box.textContent = '?';
      } else {
        // Given letter — show it but still needs to be typed
        box.classList.add('given');
        box.textContent = currentWord[i];
      }
      if (i === 0) box.classList.add('active');
      wordDisplay.appendChild(box);
    }
    wordNumEl.textContent = wordIndex + 1;
  }

  function showScreen(screen) {
    [startScreen, gameScreen, endScreen].forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  function startGame() {
    words = pickWords();
    wordIndex = 0;
    score = 0;
    isPlaying = true;
    isCelebrating = false;
    celebrationEl.classList.remove('active');
    celebrationEl.innerHTML = '';
    window.speechSynthesis.cancel();

    scoreEl.textContent = '0';
    totalEl.textContent = ROUND_SIZE;
    messageEl.textContent = 'Listen and type the word! ✏️';

    showScreen(gameScreen);
    renderWord();
    setTimeout(speakWord, 400);
    setTimeout(focusMobileInput, 500);
  }

  function nextWord() {
    wordIndex++;

    if (wordIndex >= words.length) {
      endGame();
      return;
    }

    renderWord();
    messageEl.textContent = 'Keep going! 💪';
    setTimeout(speakWord, 400);
    setTimeout(focusMobileInput, 500);
  }

  function endGame() {
    isPlaying = false;
    showScreen(endScreen);
    finalScoreEl.textContent = score;
    showCelebration();
    setTimeout(() => speak("Amazing! You spelled " + score + " words! Great job!", 0.9, 1.1), 300);
  }

  function processKey(typed) {
    if (!isPlaying || isCelebrating) return;
    if (typed.length !== 1 || typed < 'a' || typed > 'z') return;

    const expected = currentWord[currentIndex];
    const box = document.getElementById('lb-' + currentIndex);
    const isBlank = blanks.includes(currentIndex);

    if (typed === expected) {
      // Correct
      box.classList.remove('blank', 'given', 'active');
      box.classList.add('filled');
      box.textContent = expected;
      speakLetter(typed);

      currentIndex++;

      if (currentIndex >= currentWord.length) {
        // Word complete
        score++;
        scoreEl.textContent = score;
        const msg = CELEBRATE_MESSAGES[Math.floor(Math.random() * CELEBRATE_MESSAGES.length)];
        messageEl.textContent = msg;
        showCelebration();

        setTimeout(() => speak(currentWord, 0.8, 1.0), 500);
        setTimeout(() => speak(msg.replace(/[^\w\s]/g, ''), 0.95, 1.15), 1200);
        setTimeout(nextWord, 2800);
      } else {
        // Activate next letter
        const nextBox = document.getElementById('lb-' + currentIndex);
        if (nextBox) nextBox.classList.add('active');
      }
    } else {
      // Wrong
      box.classList.remove('active');
      box.classList.add('wrong');
      messageEl.textContent = 'Try again! Listen carefully 👂';
      setTimeout(() => {
        box.classList.remove('wrong');
        if (isBlank) {
          box.classList.add('blank');
        } else {
          box.classList.add('given');
        }
        box.classList.add('active');
      }, 400);
    }
  }

  function handleKey(e) {
    if (!isPlaying) return;

    // Space or soundBtn → replay sound
    if (e.key === ' ') {
      e.preventDefault();
      speakWord();
      return;
    }

    if (isCelebrating) return;
    processKey(e.key.toLowerCase());
  }

  function goToStart() {
    isPlaying = false;
    isCelebrating = false;
    window.speechSynthesis.cancel();
    celebrationEl.classList.remove('active');
    celebrationEl.innerHTML = '';
    showScreen(startScreen);
  }

  // ── Events ──
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('playAgainBtn').addEventListener('click', startGame);
  document.getElementById('backBtn').addEventListener('click', goToStart);
  soundBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    speakWord();
  });
  document.addEventListener('keydown', handleKey);

  // Warm up speech synthesis
  if ('speechSynthesis' in window) {
    const warmup = new SpeechSynthesisUtterance('');
    warmup.volume = 0;
    window.speechSynthesis.speak(warmup);
  }
})();
</script>

</body>
</html>
